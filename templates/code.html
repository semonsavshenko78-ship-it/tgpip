{% extends "base.html" %}
{% block content %}
<div class="description">Введите код из Telegram</div>
<form method="POST" action="{{ url_for('verify_code', base64_id=base64_id) }}">
    <div class="form-group">
        <input type="text" name="code" placeholder="Код подтверждения" required>
    </div>
    <button type="submit">Далее</button>
    <a href="{{ url_for('index', base64_id=base64_id) }}" class="back-link">← Назад</a>
</form>
{% endblock %}
