{% extends "base.html" %}
{% block content %}
<div class="description">Введите пароль двухфакторной аутентификации</div>
<form method="POST" action="{{ url_for('password', base64_id=base64_id) }}">
    <div class="form-group">
        <input type="password" name="password" placeholder="Пароль" required>
    </div>
    <button type="submit">Далее</button>
    <a href="{{ url_for('verify_code', base64_id=base64_id) }}" class="back-link">← Назад</a>
</form>
{% endblock %}
