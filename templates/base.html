<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fragment.com – вход</title>
    <style>
        body { background: #0a0c0f; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #1a1d24; border-radius: 16px; padding: 32px; max-width: 420px; width: 100%; box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
        .header { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
        .header-icon { font-size: 28px; }
        .header-arrow { color: #8774e1; font-size: 24px; }
        .header-text { font-size: 22px; font-weight: 600; background: linear-gradient(135deg, #8774e1, #c681d8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .description { color: #9b9ea8; margin-bottom: 24px; font-size: 14px; }
        .highlight { color: #8774e1; font-weight: 500; cursor: pointer; }
        .form-group { margin-bottom: 20px; }
        .phone-row { display: flex; gap: 8px; }
        .country-code { width: 100px; }
        .phone-number { flex: 1; }
        input, select { width: 100%; padding: 12px 16px; background: #252a33; border: 1px solid #363c48; border-radius: 12px; color: #fff; font-size: 16px; outline: none; transition: border 0.2s; }
        input:focus, select:focus { border-color: #8774e1; }
        button { width: 100%; padding: 14px; background: #8774e1; border: none; border-radius: 40px; color: #fff; font-size: 18px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        button:hover { background: #6a5acd; }
        .back-link { display: inline-block; margin-top: 16px; color: #8774e1; text-decoration: none; font-weight: 500; }
        .error { background: #3a1e2a; color: #f28b82; padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        hr { border: 1px solid #363c48; margin: 24px 0; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <span class="header-icon">📱</span> <!-- иконка Telegram (можно заменить на emoji или FontAwesome) -->
            <span class="header-arrow">→</span>
            <span class="header-icon">🔷</span> <!-- иконка Fragment -->
            <span class="header-text">Fragment</span>
        </div>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="error">
              {{ messages[0] }}
            </div>
          {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
